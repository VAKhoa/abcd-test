<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>Vibe — Find Your People</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style> 
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#7C3AED;--purple-l:#9F5FF0;--cyan:#06B6D4;--amber:#F59E0B;
  --green:#22C55E;--red:#EF4444;--bg:#0A0A0F;--map:#0F1923;
  --surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);
  --font:'Plus Jakarta Sans',-apple-system,sans-serif;
}
body{background:#111827;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:32px 16px 80px;font-family:var(--font);}
::-webkit-scrollbar{display:none}

/* ─── Keyframes ─── */
@keyframes radarPulse{0%{transform:translate(-50%,-50%) scale(0);opacity:.8}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
@keyframes avatarFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes onlinePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes celebratePop{0%{transform:scale(1)}50%{transform:scale(1.25) rotate(-5deg)}100%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(360deg);opacity:0}}

/* ─── Shared ─── */
.screen{position:absolute;inset:0;overflow:hidden;animation:fadeIn .3s ease}
.glass{background:rgba(10,10,20,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
.sheet{border-radius:28px 28px 0 0;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1)}
.btn{border:none;border-radius:16px;font-family:var(--font);font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.95)}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;box-shadow:0 8px 24px rgba(124,58,237,.4)}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),#0891B2);color:#fff;box-shadow:0 8px 24px rgba(6,182,212,.35)}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.pill{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.pill-purple{background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:#9F5FF0}
.pill-cyan{background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:var(--cyan)}
.pill-green{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.pill-amber{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
.skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px}

/* ─── Phone shell ─── */
.phone-shell{width:399px;background:#1C1C1E;border-radius:56px;padding:12px;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 60px 120px rgba(0,0,0,.9),inset 0 0 0 1px rgba(255,255,255,.04);position:relative}
.phone-notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#1C1C1E;border-radius:0 0 22px 22px;z-index:200}
.phone-screen{width:375px;height:812px;border-radius:44px;overflow:hidden;position:relative;background:var(--bg)}
.phone-home-bar{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:120px;height:5px;background:rgba(255,255,255,.28);border-radius:3px;z-index:200}

/* ─── App-level outer layout ─── */
.outer{display:flex;flex-direction:column;align-items:center;gap:24px;width:100%}
.demo-header{text-align:center}
.demo-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px}
.demo-sub{font-size:13px;color:rgba(255,255,255,.4)}
.screen-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.tab-btn{padding:8px 16px;border-radius:100px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;transition:all .2s}
.tab-active{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.45)}
.tab-inactive{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.08)}
.demo-hint{font-size:12px;color:rgba(255,255,255,.28);text-align:center}

/* ─── Status bar ─── */
.sbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 8px;position:relative;z-index:50}
.sbar-time{font-size:15px;font-weight:700;color:#fff}
.sbar-icons{display:flex;gap:5px;align-items:center}

/* ─── Nav bar ─── */
.nav-bar{position:absolute;bottom:0;left:0;right:0;height:88px;display:flex;align-items:center;justify-content:space-around;padding:0 8px 24px;z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:var(--font);font-size:10px;font-weight:700;transition:color .2s;padding:6px 12px;border-radius:12px}
.nav-active{color:var(--purple)}
.nav-inactive{color:rgba(255,255,255,.35)}

/* ─── Map background ─── */
.map-bg{position:absolute;inset:0;background:var(--map);overflow:hidden}
.map-street-h{position:absolute;left:0;right:0;background:rgba(255,255,255,.07)}
.map-street-v{position:absolute;top:0;bottom:0;background:rgba(255,255,255,.07)}
.map-block{position:absolute;background:rgba(124,58,237,.07);border-radius:2px}

/* ─── Radar ─── */
.radar-ring{position:absolute;top:42%;left:50%;border-radius:50%;border:1.5px solid rgba(124,58,237,.55);animation:radarPulse 3s ease-out infinite;pointer-events:none}
.radar-ring:nth-child(2){animation-delay:1s}
.radar-ring:nth-child(3){animation-delay:2s}
.user-pin{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);z-index:20}
.user-pin-inner{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 0 4px rgba(124,58,237,.3),0 8px 28px rgba(124,58,237,.55);border:3px solid rgba(255,255,255,.9)}
.user-pin-label{position:absolute;top:110%;left:50%;transform:translateX(-50%);background:rgba(124,58,237,.9);color:#fff;font-size:10px;font-weight:700;padding:2px 10px;border-radius:100px;white-space:nowrap}

/* ─── Avatar bubble on map ─── */
.map-avatar{position:absolute;cursor:pointer;z-index:15;transform:translate(-50%,-50%);transition:transform .2s}
.map-avatar:hover{transform:translate(-50%,-50%) scale(1.1)}
.map-avatar-inner{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;border:2.5px solid rgba(255,255,255,.85);box-shadow:0 4px 18px rgba(0,0,0,.5)}
.map-distance-label{position:absolute;top:108%;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.85);backdrop-filter:blur(8px);border-radius:100px;padding:2px 9px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;border:1px solid rgba(255,255,255,.08);margin-top:2px}

/* ─── Filter chips ─── */
.filter-bar{position:absolute;top:58px;left:0;right:0;z-index:30;padding:8px 16px}
.filter-scroll{display:flex;gap:8px;overflow-x:auto}
.filter-chip{padding:7px 16px;border-radius:100px;border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;white-space:nowrap;transition:all .2s}
.filter-active{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.5)}
.filter-inactive{background:rgba(10,10,20,.75);backdrop-filter:blur(12px);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.1)}

/* ─── Nearby user cards ─── */
.nearby-sheet{position:absolute;bottom:0;left:0;right:0;border-radius:28px 28px 0 0;border:1px solid rgba(255,255,255,.08);border-bottom:none;padding:0 0 92px}
.user-card{min-width:140px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:14px 12px;cursor:pointer;flex-shrink:0;transition:background .2s}
.user-card:hover{background:rgba(255,255,255,.09)}

/* ─── Avatar component ─── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;position:relative;flex-shrink:0}
.av-online-dot{position:absolute;bottom:1px;right:1px;background:var(--green);border-radius:50%;border:2px solid var(--bg)}

/* ─── Chat ─── */
.chat-msg-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.chat-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.4;max-width:210px;color:#fff}

/* ─── Confetti ─── */
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 1s ease forwards}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════
   DATA
══════════════════════════════════ */
const USERS = [
  { id:1, name:'Alex K.',   age:24, initials:'AK', color:'#7C3AED', tags:['Up for coffee ☕','Night walk 🌙'],  distanceRange:'300–400m',  status:'Looking to hang 👋', lastActive:'2 min ago', bio:'Product designer by day, rooftop explorer by night 🌃', mx:55, my:38, online:true,  mutual:['Coffee','Photography'] },
  { id:2, name:'Maya R.',   age:26, initials:'MR', color:'#06B6D4', tags:['Movie night 🎬','Board games 🎲'], distanceRange:'700–800m',  status:'Free until midnight 🌙', lastActive:'Just now',  bio:'Bookworm & amateur chef 🍜 Always up for something spontaneous', mx:30, my:55, online:true,  mutual:['Books','Food'] },
  { id:3, name:'Jordan M.', age:22, initials:'JM', color:'#F59E0B', tags:['Street food 🍜','Music 🎧'],      distanceRange:'1–1.2km',   status:'Bored at home 😅',     lastActive:'5 min ago', bio:'Music producer & street food connoisseur 🎵', mx:72, my:63, online:false, mutual:['Music','Food'] },
  { id:4, name:'Sam T.',    age:28, initials:'ST', color:'#10B981', tags:['Gym 💪','Sunrise run 🌅'],        distanceRange:'400–500m',  status:'Morning person 🌄',    lastActive:'1 min ago', bio:'Fitness junkie & sunrise run enthusiast 🏃', mx:44, my:72, online:true,  mutual:['Fitness'] },
];
const VENUES = [
  { id:1, name:'Blue Bottle Coffee', type:'cafe',  emoji:'☕', rating:4.8, open:'Open until 9 PM',   vibe:'Cozy & Chill ✨', vx:45, vy:38, times:{Alex:'4 min', Maya:'6 min', Sam:'5 min'} },
  { id:2, name:'Dolores Park',       type:'park',  emoji:'🌳', rating:4.9, open:'Always open',        vibe:'Outdoor Vibes 🌿', vx:24, vy:58, times:{Alex:'7 min', Maya:'5 min', Sam:'6 min'} },
  { id:3, name:'Zeitgeist Bar',      type:'bar',   emoji:'🍺', rating:4.6, open:'Open until 2 AM',   vibe:'Late Night 🌙', vx:68, vy:53, times:{Alex:'9 min', Maya:'11 min', Sam:'8 min'} },
];
const INIT_MESSAGES = [
  { id:1, uid:1, text:'omw! 5 mins 🏃‍♂️',             time:'8:42 PM' },
  { id:2, uid:2, text:'same!! cant wait 🎉',          time:'8:43 PM' },
  { id:3, uid:4, text:'already here 😎 corner table', time:'8:44 PM' },
];
const EMOJIS = ['😂','🔥','💜','👀','🙌','😍'];

/* ══════════════════════════════════
   ICONS
══════════════════════════════════ */
const Ic = {
  radar:    ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 12L7 7"/></svg>,
  people:   ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  chat:     ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  user:     ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  close:    ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  loc:      ()=><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>,
  star:     ()=><svg width="12" height="12" viewBox="0 0 24 24" fill="#F59E0B"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
  shield:   ()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  check:    ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>,
  xmark:    ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  arrow:    ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>,
  live:     ()=><span style={{width:7,height:7,borderRadius:'50%',background:'#EF4444',display:'inline-block',animation:'blink 1.2s infinite',marginRight:4}}/>,
};

/* ══════════════════════════════════
   COMPONENTS
══════════════════════════════════ */
function StatusBar(){
  return(
    <div className="sbar">
      <span className="sbar-time">9:41</span>
      <div className="sbar-icons">
        <svg width="17" height="11" viewBox="0 0 17 11">
          {[0,1,2,3].map(i=><rect key={i} x={i*4.5} y={11-(i+1)*2.75} width="3.5" height={(i+1)*2.75} rx="1" fill="rgba(255,255,255,.9)"/>)}
        </svg>
        <svg width="15" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" strokeWidth="2.2">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="rgba(255,255,255,.9)" stroke="none"/>
        </svg>
        <div style={{display:'flex',alignItems:'center',gap:1}}>
          <div style={{width:26,height:13,border:'1.5px solid rgba(255,255,255,.7)',borderRadius:3,padding:'2px 2px',display:'flex',alignItems:'center'}}>
            <div style={{width:'80%',height:'100%',background:'rgba(255,255,255,.85)',borderRadius:1}}/>
          </div>
          <div style={{width:2,height:5,background:'rgba(255,255,255,.7)',borderRadius:1}}/>
        </div>
      </div>
    </div>
  );
}

function Avatar({user,size=40,ring=false}){
  return(
    <div className="av" style={{
      width:size,height:size,
      background:`linear-gradient(135deg,${user.color},${user.color}99)`,
      fontSize:size*.34,
      boxShadow:ring?`0 0 0 2px #0A0A0F,0 0 0 4px ${user.color}60`:'none',
    }}>
      {user.initials}
      {user.online&&<div className="av-online-dot" style={{width:size*.22,height:size*.22}}/>}
    </div>
  );
}

function NavBar({active,onNav}){
  const items=[
    {key:'radar',label:'Radar',   icon:<Ic.radar/>},
    {key:'group',label:'Groups',  icon:<Ic.people/>},
    {key:'active',label:'Chats',  icon:<Ic.chat/>},
    {key:'profile',label:'Me',    icon:<Ic.user/>},
  ];
  return(
    <div className="nav-bar" style={{background:'rgba(10,10,20,.92)',backdropFilter:'blur(20px)',borderTop:'1px solid rgba(255,255,255,.07)'}}>
      {items.map(it=>(
        <button key={it.key} className={`nav-item ${active===it.key?'nav-active':'nav-inactive'}`} onClick={()=>onNav(it.key)}>
          {it.icon}{it.label}
        </button>
      ))}
    </div>
  );
}

/* ── MAP BACKGROUND ── */
function MapBackground(){
  return(
    <div className="map-bg">
      {/* Street grid */}
      {[100,185,270,360,450,540,640,730].map(y=>(
        <div key={`h${y}`} className="map-street-h" style={{top:y,height:y%185===100?3:2,opacity:y%185===100?.15:.08}}/>
      ))}
      {[55,130,200,270,340].map(x=>(
        <div key={`v${x}`} className="map-street-v" style={{left:x,width:x%130===55?3:2,opacity:x%130===55?.15:.08}}/>
      ))}
      {/* Diagonal road */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
        <line x1="0" y1="180" x2="375" y2="580" stroke="rgba(255,255,255,.08)" strokeWidth="3"/>
        <line x1="375" y1="210" x2="0" y2="530" stroke="rgba(255,255,255,.05)" strokeWidth="2"/>
      </svg>
      {/* City blocks */}
      {[
        {x:57,y:103,w:71,h:80},{x:132,y:103,w:65,h:80},{x:200,y:103,w:65,h:80},
        {x:57,y:187,w:71,h:80},{x:200,y:187,w:132,h:80},
        {x:57,y:271,w:138,h:85},{x:205,y:271,w:127,h:85},
      ].map((b,i)=>(
        <div key={i} className="map-block" style={{left:b.x,top:b.y,width:b.w,height:b.h}}/>
      ))}
      {/* Greenery patches */}
      <div style={{position:'absolute',left:20,top:460,width:90,height:60,background:'rgba(16,185,129,.06)',borderRadius:8}}/>
      <div style={{position:'absolute',left:250,top:350,width:80,height:50,background:'rgba(16,185,129,.05)',borderRadius:8}}/>
    </div>
  );
}

/* ══════════════════════════════════
   SCREEN 1 · RADAR / DISCOVERY
══════════════════════════════════ */
function RadarScreen({onUserTap,onNav}){
  const [filter,setFilter]=useState('All');
  const filters=['All','Solo','Groups','< 1km','Now'];
  return(
    <div className="screen" style={{background:'var(--map)'}}>
      <MapBackground/>

      {/* Radar rings */}
      {[0,1,2].map(i=>(
        <div key={i} className="radar-ring" style={{width:220,height:220,animationDelay:`${i}s`,marginLeft:-110,marginTop:-110}}/>
      ))}

      {/* My pin */}
      <div className="user-pin">
        <div className="user-pin-inner">😎</div>
        <div className="user-pin-label">You</div>
      </div>

      {/* Nearby user bubbles */}
      {USERS.map(u=>(
        <div key={u.id} className="map-avatar"
          style={{left:`${u.mx}%`,top:`${u.my}%`,animation:`avatarFloat ${2.8+u.id*.3}s ease-in-out infinite`,animationDelay:`${u.id*.5}s`}}
          onClick={()=>onUserTap(u)}>
          <div className="map-avatar-inner" style={{
            width:46,height:46,fontSize:16,
            background:`linear-gradient(135deg,${u.color},${u.color}aa)`,
            boxShadow:`0 0 0 3px ${u.online?u.color:'rgba(255,255,255,.2)'}`,
          }}>{u.initials}</div>
          {u.online&&<div style={{position:'absolute',bottom:2,right:2,width:10,height:10,background:'#22C55E',borderRadius:'50%',border:'1.5px solid var(--map)'}}/>}
          <div className="map-distance-label">{u.distanceRange}</div>
        </div>
      ))}

      {/* Overlay badges */}
      <div style={{position:'absolute',top:90,left:16,zIndex:30}}>

            <div style={{width:0,height:0,borderLeft:'7px solid transparent',borderRight:'7px solid transparent',borderTop:`9px solid ${sel?'#F59E0B':'rgba(10,10,20,.92)'}`,margin:'0 auto',transition:'border-top-color .25s'}}/>
          </div>
        );
      })}

      {/* My pin */}
      <div style={{position:'absolute',left:'50%',top:'60%',transform:'translate(-50%,-50%)',zIndex:15}}>
        <div style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,#7C3AED,#06B6D4)',border:'3px solid #fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,boxShadow:'0 0 0 5px rgba(124,58,237,.3)'
        }}>😎</div>
      </div>

      {/* Legend */}
      <div style={{position:'absolute',top:115,right:16,zIndex:30}}>
        <div className="glass" style={{borderRadius:14,padding:'10px 13px'}}>
          {[{e:'☕',l:'Cafe'},{e:'🌳',l:'Park'},{e:'🍺',l:'Bar'}].map(it=>(
            <div key={it.l} style={{display:'flex',alignItems:'center',gap:7,marginBottom:5,lastChild:{marginBottom:0}}}>
              <span style={{fontSize:15}}>{it.e}</span>
              <span style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,.6)'}}>{it.l}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Selected venue card */}
      {selected&&(
        <div className="sheet" style={{
          position:'absolute',bottom:0,left:0,right:0,zIndex:50,
          background:'rgba(10,10,20,.96)',backdropFilter:'blur(28px)',
          border:'1px solid rgba(255,255,255,.09)',borderBottom:'none',padding:'0 24px 36px',
        }}>
          <div style={{width:36,height:4,background:'rgba(255,255,255,.18)',borderRadius:2,margin:'16px auto 20px'}}/>
          <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:16}}>
            <div style={{width:62,height:62,borderRadius:16,background:'rgba(245,158,11,.12)',border:'1px solid rgba(245,158,11,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:30}}>{selected.emoji}</div>
            <div>
              <div style={{fontSize:19,fontWeight:800,color:'#fff'}}>{selected.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                <Ic.star/>
                <span style={{fontSize:13,fontWeight:700,color:'#F59E0B'}}>{selected.rating}</span>
                <span style={{fontSize:12,color:'rgba(255,255,255,.4)'}}>· {selected.open}</span>
              </div>
              <div style={{marginTop:6}}><span className="pill pill-amber">{selected.vibe}</span></div>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.35)',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Walk Times</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {Object.entries(selected.times).map(([n,t])=>(
                <span key={n} className="pill pill-cyan">{n}: {t}</span>
              ))}
            </div>
          </div>
          <button className="btn" onClick={doConfirm}
            style={{
              width:'100%',padding:'17px',borderRadius:18,fontSize:16,fontWeight:800,color:'#fff',
              background:confirmed?'linear-gradient(135deg,#22C55E,#16A34A)':'linear-gradient(135deg,#7C3AED,#06B6D4)',
              boxShadow:confirmed?'0 8px 24px rgba(34,197,94,.45)':'0 8px 24px rgba(124,58,237,.45)',
              transition:'all .35s',border:'none',fontFamily:'inherit',
            }}>
            {confirmed?'✅ Meetup Spot Set! Countdown started…':'📍 Set as Meetup Spot'}
          </button>
        </div>
      )}

      {/* Hint when nothing selected */}
      {!selected&&(
        <div style={{position:'absolute',bottom:32,left:0,right:0,textAlign:'center',zIndex:30}}>
          <span style={{fontSize:13,color:'rgba(255,255,255,.45)',background:'rgba(10,10,20,.8)',backdropFilter:'blur(10px)',borderRadius:100,padding:'8px 18px',border:'1px solid rgba(255,255,255,.08)'}}>
            Tap a venue pin to select it 👆
          </span>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════
   SCREEN 6 · ACTIVE HANGOUT
══════════════════════════════════ */
function ActiveHangoutScreen(){
  const members=[USERS[0],USERS[1],USERS[3]];
  const [iAmHere,setIAmHere]=useState(false);
  const [celebrating,setCelebrating]=useState(false);
  const [messages,setMessages]=useState(INIT_MESSAGES);
  const [countdown,setCountdown]=useState({m:4,s:32});
  const [confetti,setConfetti]=useState([]);
  const chatRef=useRef(null);

  useEffect(()=>{
    const t=setInterval(()=>setCountdown(p=>{
      if(p.s>0)return{...p,s:p.s-1};
      if(p.m>0)return{m:p.m-1,s:59};
      return p;
    }),1000);
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;
  },[messages]);

  const sendEmoji=(emoji)=>{
    setMessages(p=>[...p,{id:Date.now(),uid:'me',text:emoji,time:'8:47 PM',self:true}]);
  };

  const handleImHere=()=>{
    setIAmHere(true);setCelebrating(true);
    const pieces=Array.from({length:12},(_,i)=>({id:i,x:Math.random()*300+30,delay:Math.random()*.4,color:['#7C3AED','#06B6D4','#F59E0B','#22C55E','#EF4444'][Math.floor(Math.random()*5)]}));
    setConfetti(pieces);
    setTimeout(()=>{setCelebrating(false);setConfetti([])},2200);
    setMessages(p=>[...p,{id:Date.now(),uid:'me',text:"🙌 I'm HERE!!",time:'8:48 PM',self:true}]);
  };

  const etas=['5 min','8 min','🙌 Here!'];

  return(
    <div className="screen" style={{background:'#0A0A0F',display:'flex',flexDirection:'column'}}>
      <StatusBar/>

      {/* Top: Live map */}
      <div style={{height:'44%',background:'var(--map)',position:'relative',overflow:'hidden',borderBottom:'1px solid rgba(255,255,255,.07)'}}>
        <MapBackground/>
        {/* Nav paths */}
        <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
          <line x1="55" y1="225" x2="185" y2="133" stroke="#7C3AED" strokeWidth="3" strokeDasharray="6 3" opacity=".7"/>
          <line x1="305" y1="215" x2="185" y2="133" stroke="#06B6D4" strokeWidth="3" strokeDasharray="6 3" opacity=".7"/>
          <line x1="120" y1="238" x2="185" y2="133" stroke="#10B981" strokeWidth="3" strokeDasharray="6 3" opacity=".7"/>
        </svg>
        {/* Member pins */}
        {members.map((m,i)=>{
          const pos=[{l:'15%',t:'66%'},{l:'82%',t:'63%'},{l:'32%',t:'70%'}];
          return(
            <div key={m.id} style={{position:'absolute',left:pos[i].l,top:pos[i].t,transform:'translate(-50%,-50%)',zIndex:10}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:m.color,border:'2.5px solid #fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#fff',boxShadow:`0 4px 14px ${m.color}66`}}>{m.initials}</div>
              <div style={{position:'absolute',bottom:'105%',left:'50%',transform:'translateX(-50%)',background:i===2?'rgba(34,197,94,.9)':'rgba(6,182,212,.9)',borderRadius:100,padding:'2px 8px',fontSize:9,fontWeight:700,color:'#fff',whiteSpace:'nowrap',marginBottom:3}}>
                {etas[i]}
              </div>
            </div>
          );
        })}
        {/* Destination */}
        <div style={{position:'absolute',left:'50%',top:'30%',transform:'translate(-50%,-100%)',zIndex:15}}>
          <div style={{background:'#F59E0B',borderRadius:12,padding:'6px 12px',display:'flex',alignItems:'center',gap:6,boxShadow:'0 6px 20px rgba(245,158,11,.5)'}}>
            <span style={{fontSize:16}}>☕</span>
            <div><div style={{fontSize:11,fontWeight:800,color:'#000'}}>Blue Bottle Coffee</div><div style={{fontSize:9,color:'rgba(0,0,0,.55)'}}>Meetup spot</div></div>
          </div>
          <div style={{width:0,height:0,borderLeft:'7px solid transparent',borderRight:'7px solid transparent',borderTop:'9px solid #F59E0B',margin:'0 auto'}}/>
        </div>
        {/* Countdown */}
        <div style={{position:'absolute',top:10,right:12,background:'rgba(10,10,20,.85)',backdropFilter:'blur(14px)',border:'1px solid rgba(245,158,11,.3)',borderRadius:16,padding:'10px 16px',textAlign:'center',zIndex:20}}>
          <div style={{fontSize:24,fontWeight:800,color:'#F59E0B',fontVariantNumeric:'tabular-nums',letterSpacing:1}}>
            {String(countdown.m).padStart(2,'0')}:{String(countdown.s).padStart(2,'0')}
          </div>
          <div style={{fontSize:10,fontWeight:600,color:'rgba(255,255,255,.4)'}}>to meetup</div>
        </div>
        {/* Live badge */}
        <div style={{position:'absolute',top:10,left:12,background:'rgba(239,68,68,.18)',border:'1px solid rgba(239,68,68,.4)',borderRadius:100,padding:'5px 11px',display:'flex',alignItems:'center',fontSize:11,fontWeight:700,color:'#EF4444',zIndex:20}}>
          <Ic.live/>LIVE
        </div>
        {/* Celebration */}
        {celebrating&&(
          <div style={{position:'absolute',inset:0,background:'rgba(124,58,237,.25)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:30}}>
            <span style={{fontSize:72,animation:'celebratePop .4s ease infinite'}}>🎉</span>
          </div>
        )}
        {/* Confetti */}
        {confetti.map(p=>(
          <div key={p.id} style={{position:'absolute',left:p.x,top:0,width:8,height:8,borderRadius:2,background:p.color,animation:`confettiFall 1.2s ease forwards`,animationDelay:`${p.delay}s`,zIndex:35}}/>
        ))}
      </div>

      {/* Bottom: Chat */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* ETA chips */}
        <div style={{display:'flex',gap:8,padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,.06)',overflowX:'auto',flexShrink:0}}>
          {members.map((m,i)=>(
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
              <div style={{width:24,height:24,borderRadius:'50%',background:m.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'#fff'}}>{m.initials}</div>
              <span className={`pill ${i===2?'pill-green':'pill-cyan'}`} style={{fontSize:10,padding:'3px 9px'}}>{etas[i]}</span>
            </div>
          ))}
        </div>

        {/* Messages */}
        <div ref={chatRef} style={{flex:1,overflowY:'auto',padding:'12px 16px'}}>
          {messages.map(msg=>{
            const u=USERS.find(u=>u.id===msg.uid)||{name:'You',initials:'ME',color:'#7C3AED',online:true};
            const self=msg.self||msg.uid==='me';
            return(
              <div key={msg.id} className="chat-msg-row" style={{flexDirection:self?'row-reverse':'row'}}>
                {!self&&<div style={{width:28,height:28,borderRadius:'50%',background:u.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff',flexShrink:0}}>{u.initials}</div>}
                <div>
                  {!self&&<div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.4)',marginBottom:3}}>{u.name}</div>}
                  <div className="chat-bubble" style={{background:self?'linear-gradient(135deg,#7C3AED,#9F5FF0)':'rgba(255,255,255,.07)',borderRadius:self?'18px 18px 4px 18px':'18px 18px 18px 4px',fontSize:msg.text.length<=4?22:14}}>
                    {msg.text}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Emoji reactions */}
        <div style={{padding:'8px 16px',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',gap:6,flexShrink:0}}>
          {EMOJIS.map(e=>(
            <button key={e} onClick={()=>sendEmoji(e)}
              style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.09)',borderRadius:12,padding:'9px 4px',fontSize:18,cursor:'pointer',transition:'transform .1s,background .15s'}}
              onMouseEnter={ev=>ev.target.style.background='rgba(255,255,255,.13)'}
              onMouseLeave={ev=>ev.target.style.background='rgba(255,255,255,.06)'}
            >{e}</button>
          ))}
        </div>

        {/* I'm Here button */}
        <div style={{padding:'8px 16px 24px',flexShrink:0}}>
          <button className="btn" onClick={handleImHere}
            style={{
              width:'100%',padding:'17px',borderRadius:18,fontSize:17,fontWeight:800,color:'#fff',
              background:iAmHere?'linear-gradient(135deg,#22C55E,#16A34A)':'linear-gradient(135deg,#7C3AED,#06B6D4)',
              boxShadow:iAmHere?'0 8px 24px rgba(34,197,94,.45)':'0 8px 24px rgba(124,58,237,.45)',
              border:'none',fontFamily:'inherit',letterSpacing:.3,transition:'all .3s',
            }}>
            {iAmHere?"🎉 You're here! Party time!":'🙌 I\'m Here!'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   SCREEN ROUTER
══════════════════════════════════ */
function ScreenRouter({screen,onNavigate}){
  const [user,setUser]=useState(USERS[0]);
  const go=(s)=>onNavigate(s);

  const handleUserTap=(u)=>{setUser(u);go('profile')};

  switch(screen){
    case 'radar':      return <RadarScreen onUserTap={handleUserTap} onNav={go}/>;
    case 'profile':    return <ProfileSheet user={user} onClose={()=>go('radar')} onSendVibe={()=>go('connection')} onSuggestSpot={()=>go('meetup')}/>;
    case 'connection': return <ConnectionScreen onAccept={()=>go('group')} onDecline={()=>go('radar')}/>;
    case 'group':      return <GroupScreen onPickSpot={()=>go('meetup')}/>;
    case 'meetup':     return <MeetupScreen onConfirm={()=>go('active')}/>;
    case 'active':     return <ActiveHangoutScreen/>;
    default:           return <RadarScreen onUserTap={handleUserTap} onNav={go}/>;
  }
}

  {key:'group',      label:'4. Group'},

];

    <div className="outer">

        <div className="demo-sub">High-fidelity mobile UI · 6 interactive screens</div>
